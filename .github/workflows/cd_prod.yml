name: Deploy to production

on:
  push:
    branches:
      - production

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{secrets.EC2_SSH_PRIVATE_KEY}}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{secrets.PRODUCTION_HOST}}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key ${{secrets.PRODUCTION_USER}}@${{secrets.PRODUCTION_HOST}} "cd ${{secrets.PRODUCTION_APP_DIR}} && pwd && hostname"

      - name: Check remote runtime
        run: |
          ssh -i ~/.ssh/deploy_key ${{secrets.PRODUCTION_USER}}@${{secrets.PRODUCTION_HOST}} '
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ${{ secrets.PRODUCTION_APP_DIR }}

            node -v
            pnpm -v
            pm2 -v
          '

      - name: Sync latest code on production
        run: |
          ssh -i ~/.ssh/deploy_key ${{secrets.PRODUCTION_USER}}@${{secrets.PRODUCTION_HOST}} '
            cd ${{secrets.PRODUCTION_APP_DIR}}

            git fetch origin production
            git reset --hard origin/production
            
            git rev-parse --short HEAD
          '

      - name: Install dependencies on production
        run: |
          ssh -i ~/.ssh/deploy_key ${{secrets.PRODUCTION_USER}}@${{secrets.PRODUCTION_HOST}} '
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ${{ secrets.PRODUCTION_APP_DIR }}

            pnpm install --frozen-lockfile
          '

      - name: Run Prisma on production
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ${{ secrets.PRODUCTION_APP_DIR }}

            pnpm --filter @repo/db db:generate
            pnpm --filter @repo/db db:deploy
          '

      - name: Build app on production
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ${{ secrets.PRODUCTION_APP_DIR }}

            pnpm run build
          '
      
      - name: Restarting production services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            pm2 restart http-server --update-env
            pm2 restart ws-server --update-env
            pm2 restart fe-server --update-env

            pm2 ls
          '
      - name: Health check production
        run: |
          curl -f --retry 10 --retry-delay 3 --retry-connrefused http://ci-cd-aws-monorepo-http.kushagrasuryawanshi.com
          curl -f -I --retry 10 --retry-delay 3 --retry-connrefused http://ci-cd-aws-monorepo-fe.kushagrasuryawanshi.com